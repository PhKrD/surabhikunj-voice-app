name: Supabase Keep-Alive

# Runs daily at 02:00 UTC (07:30 IST) to prevent the free-tier Supabase
# project from auto-pausing after 7 days of inactivity.
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch: # allow a manual trigger from the GitHub Actions UI

jobs:
  ping:
    name: Ping Supabase auth
    runs-on: ubuntu-latest
    steps:
      - name: Check Supabase health
        run: |
          CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            "${{ secrets.SUPABASE_URL }}/auth/v1/health")
          echo "Supabase auth/v1/health → HTTP $CODE"
          if [ "$CODE" != "200" ]; then
            echo "ERROR: Supabase is not healthy (HTTP $CODE). Check the dashboard."
            exit 1
          fi
          echo "✓ Supabase is alive and healthy."
